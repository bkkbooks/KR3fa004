body:
  text: 朝辨雨法有黑雲如一匹皂于日中即一日大雨二匹二日大雨三匹十日大雨也青白赤黑雲在東西南北名曰四塞之雲見即有雨也日午刻有風亂動幃幕者立時雨至也日出其下有雲如散泉者即雨或次日日中南方有雲如散泉者申刻雨日入日上有雲如散泉者或在日下皆夜中雨也月下有黑雲如龜者次日有雨察日月並星宿日出不見雲有大風日出即煊有細雨日出便有輝雨在日內日出而雨日入而息日色黑者大霧細雨二十日日色無光大雨日中重影大雨三日日熱殺人六月霜雨日出裂木有雨日出射竹木有光采有雨月朔有雨晦亦有雨上弦日前後無雨下弦則雨下弦無月魄則注晦日無上弦則雨
