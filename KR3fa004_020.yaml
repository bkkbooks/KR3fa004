body:
  text: 後以此之時請雨則用壘土為龍使二童舞之入山如此數日則天降甘霖也故淮南曰土龍致雨凡少年婦女仰天大號泣不語則雨降神農求雨書曰春夏雨日而不雨甲乙命為青龍又為火龍東方小童舞之丙丁不雨命為赤龍南方壯者舞之戊巳不雨命為黃龍壯者舞之庚辛不雨命為白龍又為火龍西方老人舞之壬癸不雨命為黑龍北方老人舞之如此不雨遂潛處闔南門置水其外開北門取人骨埋之如此不雨命祝巫而暴之暴之不雨神山積薪擊鼓而焚之祈晴雨久急欲止者取銅甁著四五斗沸湯綿絮固口入井聲振數十里則雨止但旱五十日耳大潦欲止者使三寡婦七孤兒持搗米杵孤兒仰天號寡婦伏地哭則雨立時而止也以下闕七條右相雨書十篇候氣者三十觀雲者五十有二察日月並宿星者三十有一會風者四詳聲者七推時者十二雜觀者十四候雨止天晴者七禱雨者三祈晴者九共為百六十有九皆有準驗為唐人黃子發所著夫唐三百年間論天文者寥寥可數況卜陰晴于
  hash: sha256:56d44e7cc7e3dbc7e12ced9cd0b92fbd9fd297e93101d598f529aa6cc6d021f8
