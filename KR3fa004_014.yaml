body:
  text: 風雨俱從坎處入幕吹甁有聲北方三里外有火災三十里外復有火災五百里外大火流血推峕春雪後二旬有大風凡以降霜後有風雷者次歲春多陰立春不見日雨在春末夏初最多也春日寒者有久雨冬雪不積小雨將至也冬雪久積又有大雪也月二十五六日不雨初五六日必雨二十二日雨二十八日又雨正月不見雨二月不見晴夏旱三十日次歲春雨二十日秋旱三十日次歲夏雨七日不止凡夏旱甲子日雨者秋旱四十日秋甲子雨者冬旱六十日冬甲子雨者春旱四十日春甲子雨者夏旱六十日相草木蟲魚玉石每夕取通草一莖以火然之盡者次日晴不盡者雨雨注著樹不下地邑有災也或曰大水沒郭
  hash: sha256:a529de5c338e511140303de1dddafff96625a06eed32cb2d2d6d5bc4e318f40d
