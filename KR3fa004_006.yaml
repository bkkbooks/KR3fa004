body:
  text: 方黑者大雨青者小雨以丙丁辰之日四方無雲唯漢中有雲者六中日風雨如常以六甲日平旦淸明東向望日始出時如日上有直雲大小貫日中青者以甲乙日雨赤者以丙丁日雨白者以庚辛日雨黑者以壬癸日雨黃者以戊己日雨六甲日四方雲皆合者卽雨四方有躍魚雲遊疾者卽日雨遊遲者雨少難至四方有雲如羊豬者雨立至四方北斗中有雲後五日大雨四方北斗中無雲唯河中有雲三枚相連狀如浴豬後三日大雨日入時有黑雲相接于日雨注卽傾滴也日沒時雲暗紅者或風或雨午刻有雲蔽日者夜中大雨日始出東南有黑雲巳刻雨日入西北有黑雲覆日夜半雨淸晨雲如海濤者卽時風雨興也雲逆風行者卽雨也日已出卯刻有大雲渾者天陰淸者天雨
