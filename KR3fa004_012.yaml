body:
  text: 月光大明七日有雨三日月覆者次日雨晦日見月名曰炙虧日出必有雨月宿房雨如霰日中遂散月宿箕大風飛水月宿斗口中三日大雨月宿虛風發大水月宿畢風雨興也月宿井大水敗穀月宿張翼大雨雪月無光四日大雨月返炤大雨月與水宿會大雨三日太白入斗五日陰雨不見星會風詳聲雨中大風飛雹者九日後復來雨後檐前有滴聲者不久又大雨春日北風晴日中又雨九日不改風每日風雨日星皆見謂之太和雨扣石無聲日中大雨始雨瓦木皆有聲大雨在半日後雨注聲如裂帛南方百里外有火災細雨有聲東方五十里外有火災雨過瓦裂作聲西方十里外有火災
