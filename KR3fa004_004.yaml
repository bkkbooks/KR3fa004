body:
  text: 視黑氣于日下如覆船者立時遂雨氣從下上于雲漢者雨數日凡黃霧四塞者日晴則雨日雨則晴不雨不晴則民擾亂日沒有黑虹次後一日雨月中生長虹首南北貫月者小雺三日大雺五日十二日後大雨雹西北聞雷雨至之候也次後二日復來既雨且霧次復二日後大雨雨前霧者至夕頽壁也雨後霧者城陷之候遠觀十里外有青黑氣者大雨將至午刻日色赤者次後一日雨申刻日色赤次後二日雨日入光赤七日後雨日始出色赤即日雨觀雲候日始出日正中有雲覆日而四方亦有雲黑者大雨青者小雨日入方雨時觀雲有五色黑赤並見者雨即止黃白者風多雨少青黑雜者雨隨之必滂沛流潦常以戊申日候日欲入時日上有別雲不論大小視四
