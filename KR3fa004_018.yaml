body:
  text: 丙寅雨者卽日止丁卯雨者日沒止戊辰雨者夜半止己巳雨者立刻止庚午雨者一日止辛未雨者七日止壬申雨者卽止癸酉雨二日止甲戌雨卽時止乙亥雨卽日止丙子雨夕止丁丑雨夕止戊寅雨卽止己卯雨立止庚辰雨卽止辛巳雨二日止壬午雨卽止癸未雨一日止甲申雨卽日止乙酉雨一日止丙戌雨夕止丁亥雨卽時止戊子雨二日止己丑雨三日止庚寅雨卽止辛卯雨二日止壬辰雨八日止癸巳雨夕止甲午雨卽時止乙未雨二日止丙申雨夕止丁酉雨一日止戊戌雨一日止三日天晴雨大止己亥雨卽時止庚子雨四日止辛丑雨一日止壬寅雨卽時止癸卯雨卽止甲辰雨卽止乙巳雨一日止丙午雨卽時止丁未雨立止戊申雨二日止己酉雨二日止庚戌雨卽時止辛亥雨二日止壬子雨一日止癸丑雨卽時止甲寅雨立時止乙卯雨一日止丙辰雨一日止丁巳雨卽時止戊午雨立止己未雨卽時止庚申雨四日止辛酉雨卽日止壬戌雨卽時止癸亥雨立止半天雲霧見日在洞中雨止天遂晴禱雨冬春夏秋四時之首甲子日不宜雨雨必旱在六十日
