body:
  text: 唐黃子發撰候氣凡有珥者狂風迅起在日爲風在月有雨五緯生珥大雨滂沛者二十日候申後日有珥者雨在次後一日候日暈午刻前暈者風起正北方午刻後暈者有大風發屋拔木風從暈門處來視日出氣正白日入氣正赤者皆走石飛沙日入有光燭天者晝夜連陰二十日日入返炤有黃光者次後一日大風晚有斷虹者半夜有雨達日中日已射廬猶有霧者細雨兩日三日有霧濛濛者狂飆大起白虹降惡霧遂散電光出西北方雨注傾壁也辰刻電大風吹樹至暮遂雨電光與星同耀者有烈風暴雨日始出南方有霧者辰刻雨日出無風而熱者至日中則雲雷作風雨興也
  hash: sha256:3e24cfe15c7fbc56a9363c67bea790142ba93c14a29a769c52844a0fd372260c
