body:
  text: 雨凝如漆著竹木上其主有凶視鸛鳴亂翔夸睪飛鳴者雨立至鴉飛鼓翅有聲將雨纍日樹穴生水天有雨雨落井中生泡者越下愈大也雨中鴉鳴翅無聲雨遂止視蟻登壁者將雨之候也視魚躍波者天將陰雨壁上自然生水者天將大雨石上津潤出液將雨數日雨注不息政不和也虎龍相鬭日光大烈而雨也犬貓食草次日雨又晴候雨止天晴雨後見漢中有雲在箕尾間天晴之候也陰雨時雲下見有日光則天晴雲飛疾雨下速者風雨即止曉雲在東無雨天晴也夏日夜中雨至旦日出便止雨注無風五日後始晴候晴六十日者以甲子雨者二日止乙丑雨者二日止
  hash: sha256:4d5fe5dd91bf4ad4b0d079decb7dbc3e528927c6cce808c62d3e034964e3bd93
