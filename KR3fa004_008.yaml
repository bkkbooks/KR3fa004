body:
  text: 雲在山下布滿者連宵細雨數日雲若魚鱗次日風最大夜雨達旦盈盈不盡者細雨還大也天中有雲亂擾者風雨最多也日出紅雲見申刻有雨雨隨風亂飛無力者霎時大霧天黯也日沒紅雲見次日雨凡秋冬以東風南風有雨春夏以西風北風有雨訊頭風不長過後風雨愈毒也夏日雨過東風起遲暮越大將拔屋凡候雨以晦朔弦望雲漢四塞者皆當雨如斗牛彘者當雨暴有異雲如水牛者不三日大雨黑雲如羊羣奔如飛鳥五日必雨雲如覆船者皆雨北斗獨有雲不五日大雨四望見青白雲名曰天寒之雲雨徵蒼雲黑色細如杼柚蔽日月者五日必雨雲如兩人提鼓持桴者皆為大暴雨也日入時雲皆如亂草者次日雨
