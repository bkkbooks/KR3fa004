body:
  text: 俄頃辨風雨于一時乎歷朝以來惟漢東方曼倩著風雨書二卷京房著占一卷訖今不傳固可惜也嗣後七八百年之閒絶而不彰即淳風天綱天文之士所著亦不過占星候氣而已未嘗究竟于風雨也夫風雨之候有關于國者最大軍期祭日率有所資下至野老農夫無不秉耒而觀晴雨是以曠代不聞者或恐占之而不驗或疑五行之不詳而不知天日之理有不然者往年豫適楚偶于故家敗簏中得是書殘編斷簡僅十四頁披閲其目校之祇闕數行而已于是手録一過并贅以贊云天地之大萬物俱載不風不雨民復食土既風既雨乃得其所數風數雨人民其苦若夫太平之世五風十雨市井晏安之時得是書以課卜陰晴亦是隱居一樂耳大德八年歲次閼逢執徐八月仲秋紫陽山虛谷叟方回序相雨書卷全終
  hash: sha256:70b8747901d11c7b84d930f0faf1b3bba21c782822c634e0de57db8fe73baf67
